[alembic]
script_location = alembic
prepend_sys_path = .
# NOTE: sqlalchemy.url is overridden by env.py from app.config.settings.database_url
# This placeholder is only used if env.py fails to load.
sqlalchemy.url = placeholder://overridden-by-env-py

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
